name: Build radar & deploy to Pages

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "scripts/fetch_radar.py"
      - ".github/workflows/deploy.yml"
  schedule:
    # 每 10 分鐘產生最新雷達回波(雷達本身 10 分更新一次)。
    # 註:GitHub 排程繁忙時可能延遲數分鐘;repo 60 天無活動排程會被停用。
    - cron: "*/10 * * * *"
  workflow_dispatch:

# 同時只跑一個部署,新的取代排隊中的
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install numpy pillow

      - name: Generate radar overlay
        run: python scripts/fetch_radar.py
        # 抓取失敗不讓整個部署卡住(仍會部署上一版網站 + CCTV)
        continue-on-error: true

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
